# Medical Chart Validation System - Docker Compose Configuration
# Development and testing environment

services:
  # Main Streamlit Application
  medchart-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medchart-app
    ports:
      - "8501:8501"
    volumes:
      # Persistent database storage
      - ./data:/app/data
      # Sample data (read-only)
      - ./medchart_demo/sample_data:/app/sample_data:ro
    environment:
      # Database configuration
      - DB_PATH=/app/data/medchart.db
      # Streamlit configuration
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      # Optional: Groq API key (for AI analytics)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - medchart-network

  # Optional: MCP Server (Model Context Protocol)
  # Uncomment to enable MCP protocol access
  # medchart-mcp:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: medchart-mcp
  #   command: ["python", "mcp_server.py"]
  #   volumes:
  #     - ./data:/app/data
  #   environment:
  #     - DB_PATH=/app/data/medchart.db
  #   env_file:
  #     - .env
  #   restart: unless-stopped
  #   depends_on:
  #     - medchart-app
  #   networks:
  #     - medchart-network

networks:
  medchart-network:
    driver: bridge

