# Medical Chart Validation System - Production Docker Compose Configuration
# Production-ready deployment with enhanced security and monitoring

version: '3.8'

services:
  # Main Streamlit Application
  medchart-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-}
        - VERSION=${VERSION:-1.0.0}
    container_name: medchart-app-prod
    restart: always
    ports:
      - "8501:8501"
    volumes:
      # Persistent database storage (named volume for production)
      - medchart-data:/app/data
      # Sample data (read-only)
      - ./medchart_demo/sample_data:/app/sample_data:ro
    environment:
      # Database configuration
      - DB_PATH=/app/data/medchart.db
      # Streamlit production configuration
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=true
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=none
      - STREAMLIT_LOGGER_LEVEL=info
      # Optional: Groq API key (use Docker secrets in production)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    env_file:
      - .env.prod
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - medchart-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy (Optional - for SSL/TLS termination)
  nginx:
    image: nginx:alpine
    container_name: medchart-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - medchart-app
    networks:
      - medchart-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: MCP Server (Model Context Protocol)
  medchart-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medchart-mcp-prod
    restart: always
    command: ["python", "mcp_server.py"]
    volumes:
      - medchart-data:/app/data
    environment:
      - DB_PATH=/app/data/medchart.db
    env_file:
      - .env.prod
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      - medchart-app
    networks:
      - medchart-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Monitoring with Prometheus
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: medchart-prometheus
  #   restart: always
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus-data:/prometheus
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #   networks:
  #     - medchart-network

  # Optional: Grafana for visualization
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: medchart-grafana
  #   restart: always
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
  #   depends_on:
  #     - prometheus
  #   networks:
  #     - medchart-network

networks:
  medchart-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  # Named volumes for production data persistence
  medchart-data:
    driver: local
  nginx-cache:
    driver: local
